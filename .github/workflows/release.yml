name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Re-run tag + release + dispatch (e.g. v1.2.63)
        required: true
        type: string
      version:
        description: Plugin version without v prefix (optional; derived from tag)
        required: false
        type: string

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'WeZZard/amplify'
    uses: WeZZard/workflows/.github/workflows/release-plugin.yml@v1.0.0
    with:
      plugin_name: amplify
      version_file: .claude-plugin/plugin.json
      release_title_prefix: Amplify
      source_repo: WeZZard/amplify
      event_name: ${{ github.event_name }}
      dispatch_tag: ${{ github.event.inputs.tag }}
      dispatch_version: ${{ github.event.inputs.version }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.AMPLIFY_RELEASE_TOKEN }}
